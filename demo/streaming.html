<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MS-DOC Viewer - Streaming Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
    .badge { display: inline-block; background: #4CAF50; color: white; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; vertical-align: middle; }
    .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 50px 30px; text-align: center; cursor: pointer; background: white; transition: all 0.2s; }
    .upload-area:hover, .upload-area.dragover { border-color: #4CAF50; background: #E8F5E9; }
    .upload-area p { font-size: 16px; color: #666; }
    .viewer { border: 1px solid #ddd; border-radius: 10px; padding: 24px; margin-top: 16px; min-height: 180px; background: white; }
    .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
    .info { color: #2E7D32; background: #E8F5E9; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; font-size: 13px; line-height: 1.6; }
    .status { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 13px; color: #666; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .status-dot.ready { background: #4CAF50; }
    .status-dot.working { background: #FF9800; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .back { display: inline-block; margin-bottom: 16px; color: #4CAF50; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    .chunk-indicator { font-size: 11px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">&larr; All Demos</a>
  <h1>MS-DOC Viewer <span class="badge">Streaming</span></h1>
  <p class="subtitle">Progressive rendering: content appears chunk by chunk</p>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Initializing worker...</span>
  </div>
  <div class="chunk-indicator" id="chunkIndicator"></div>

  <div class="upload-area" id="dropZone">
    <p>Drag & drop a .doc file here, or click to select</p>
    <input type="file" id="fileInput" accept=".doc" style="display:none">
  </div>

  <div class="info" id="info"></div>
  <div class="error" id="error"></div>
  <div class="viewer" id="viewer"></div>

  <script type="module">
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const viewer = document.getElementById('viewer');
    const info = document.getElementById('info');
    const error = document.getElementById('error');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const chunkIndicator = document.getElementById('chunkIndicator');

    let worker = null;
    let requestId = 0;
    const pending = new Map();

    function initWorker() {
      worker = new Worker(new URL('../worker/worker_wrapper.js', import.meta.url), { type: 'module' });
      worker.onmessage = (e) => {
        const { id, type, result, error: err } = e.data;
        if (type === 'ready') { statusDot.className = 'status-dot ready'; statusText.textContent = 'Worker ready'; return; }
        const p = pending.get(id);
        if (p) {
          pending.delete(id);
          if (err) { p.reject(new Error(err)); } else { p.resolve(result); }
        }
      };
      worker.onerror = (e) => { statusDot.className = 'status-dot'; statusText.textContent = 'Error'; console.error(e); };
    }

    function callWorker(type, data, extra = {}) {
      return new Promise((resolve, reject) => {
        const id = ++requestId;
        pending.set(id, { resolve, reject });
        worker.postMessage({ type, data, id, ...extra });
      });
    }

    function waitForReady() {
      return new Promise((resolve) => {
        const check = (e) => { if (e.data.type === 'ready') { worker.removeEventListener('message', check); resolve(); } };
        worker.addEventListener('message', check);
      });
    }

    // Parse ChunkResult format: "{asset_count}|||{html}|||{idx0},{idx1},..."
    function parseChunkResult(raw) {
      const offSep = raw.indexOf('|||');
      if (offSep < 0) return { assetCount: 0, html: raw, assetIndices: [] };
      const assetCount = parseInt(raw.substring(0, offSep), 10) || 0;
      const rest = raw.substring(offSep + 3);
      const idxSep = rest.indexOf('|||');
      if (idxSep < 0) return { assetCount, html: rest, assetIndices: [] };
      const html = rest.substring(0, idxSep);
      const idxStr = rest.substring(idxSep + 3);
      const assetIndices = idxStr.length > 0 ? idxStr.split(',').map(Number) : [];
      return { assetCount, html, assetIndices };
    }

    // Process a single image by asset index, replace DOM element
    async function processImage(assetIndex) {
      try {
        const dataUrl = await callWorker('streamExtractImage', null, { offset: assetIndex });
        if (dataUrl && dataUrl.startsWith('data:') && !dataUrl.includes('svg+xml')) {
          const img = viewer.querySelector(`img[data-asset-index="${assetIndex}"]`);
          if (img) {
            img.src = dataUrl;
            img.removeAttribute('data-placeholder');
            img.removeAttribute('data-asset-index');
            replacedCount++;
            chunkIndicator.textContent = `Rendering... | ${replacedCount}/${totalImages} images`;
          }
        }
      } catch (e) {
        console.error(`[Stream] Failed to process image ${assetIndex}:`, e);
      }
    }

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); });

    // Counters
    let replacedCount = 0;
    let totalImages = 0;

    async function loadFile(file) {
      try {
        error.style.display = 'none'; info.style.display = 'none'; viewer.innerHTML = '';
        if (!worker) { initWorker(); await waitForReady(); }

        const buffer = await file.arrayBuffer();
        const data = new Uint8Array(buffer);

        statusDot.className = 'status-dot working';
        statusText.textContent = 'Parsing document...';

        const t0 = performance.now();

        // Phase 1: Parse
        const initResult = await callWorker('streamInit', data, { chunkSize: 30 });
        const css = initResult.css || '';
        const totalBlocks = initResult.totalBlocks || 0;
        const offsets = initResult.offsets || '';
        totalImages = offsets.length > 0 ? offsets.split(',').length : 0;
        const parseTime = performance.now() - t0;

        statusText.textContent = 'Rendering chunks...';
        viewer.innerHTML = '<style>' + css + '</style>';

        // Phase 2: Progressive chunk rendering with concurrent image processing
        const CHUNK_SIZE = 30;
        const imagePromises = [];
        for (let start = 0; start < totalBlocks; start += CHUNK_SIZE) {
          const count = Math.min(CHUNK_SIZE, totalBlocks - start);
          const raw = await callWorker('streamChunk', null, { start, count });
          const { html, assetIndices } = parseChunkResult(raw);

          // Append HTML to DOM
          const wrapper = document.createElement('div');
          wrapper.innerHTML = html;
          while (wrapper.firstChild) { viewer.appendChild(wrapper.firstChild); }

          // Queue image processing for this chunk's assets
          for (const idx of assetIndices) {
            imagePromises.push(processImage(idx));
          }

          chunkIndicator.textContent = `Rendering ${Math.min(start + count, totalBlocks)}/${totalBlocks} blocks...`;
          await new Promise(r => setTimeout(r, 0));
        }

        // Phase 3: Footer
        const footer = await callWorker('streamFooter');
        const footWrapper = document.createElement('div');
        footWrapper.innerHTML = footer;
        while (footWrapper.firstChild) { viewer.appendChild(footWrapper.firstChild); }

        // Phase 4: Wait for all image processing to complete
        if (imagePromises.length > 0) {
          statusText.textContent = 'Loading images...';
          await Promise.all(imagePromises);
        }

        // Phase 5: Release context
        await callWorker('streamRelease');

        const totalTime = performance.now() - t0;
        statusDot.className = 'status-dot ready';
        statusText.textContent = 'Complete';
        chunkIndicator.textContent = `${replacedCount}/${totalImages} images loaded`;

        info.style.display = 'block';
        info.innerHTML =
          '<strong>Streaming Results</strong><br>' +
          'File: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)<br>' +
          'Blocks: ' + totalBlocks + '<br>' +
          'Images: ' + totalImages + ' (concurrent loading)<br>' +
          'Parse: ' + parseTime.toFixed(0) + ' ms<br>' +
          'Total: ' + totalTime.toFixed(0) + ' ms';

      } catch (err) {
        statusDot.className = 'status-dot'; statusText.textContent = 'Error';
        error.style.display = 'block'; error.textContent = 'Error: ' + err.message;
        viewer.innerHTML = ''; console.error(err);
      }
    }

    initWorker();
  </script>
</body>
</html>
