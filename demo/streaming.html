<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MS-DOC Viewer - Streaming Mode</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
    .badge { display: inline-block; background: #4CAF50; color: white; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; vertical-align: middle; }
    .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 50px 30px; text-align: center; cursor: pointer; background: white; transition: all 0.2s; }
    .upload-area:hover, .upload-area.dragover { border-color: #4CAF50; background: #E8F5E9; }
    .upload-area p { font-size: 16px; color: #666; }
    .viewer { border: 1px solid #ddd; border-radius: 10px; padding: 24px; margin-top: 16px; min-height: 180px; background: white; }
    .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; }
    .info { color: #2E7D32; background: #E8F5E9; padding: 12px; border-radius: 6px; margin-top: 12px; display: none; font-size: 13px; line-height: 1.6; }
    .status { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 13px; color: #666; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .status-dot.ready { background: #4CAF50; }
    .status-dot.working { background: #FF9800; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .back { display: inline-block; margin-bottom: 16px; color: #4CAF50; text-decoration: none; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    .progress-bar { width: 100%; height: 4px; background: #e0e0e0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
    .progress-bar .fill { height: 100%; background: #4CAF50; transition: width 0.1s; width: 0%; }
    .chunk-indicator { font-size: 11px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">&larr; All Demos</a>
  <h1>MS-DOC Viewer <span class="badge">Streaming</span></h1>
  <p class="subtitle">Progressive rendering: content appears as it's parsed, not all at once</p>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Initializing worker...</span>
  </div>

  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  <div class="chunk-indicator" id="chunkIndicator"></div>

  <div class="upload-area" id="dropZone">
    <p>Drag & drop a .doc file here, or click to select</p>
    <input type="file" id="fileInput" accept=".doc" style="display:none">
  </div>

  <div class="info" id="info"></div>
  <div class="error" id="error"></div>
  <div class="viewer" id="viewer"></div>

  <script type="module">
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const viewer = document.getElementById('viewer');
    const info = document.getElementById('info');
    const error = document.getElementById('error');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const chunkIndicator = document.getElementById('chunkIndicator');

    let worker = null;
    let requestId = 0;
    const pending = new Map();
    // For streaming: accumulate auto-streamed chunks
    let streamChunks = [];
    let streamCss = '';
    let streamTotalBlocks = 0;
    let streamReceived = 0;
    let streamWaitingFor = null;
    let streamData = null;  // Original file bytes for image extraction
    let streamOffsets = '';  // Asset offsets for image extraction

    function initWorker() {
      worker = new Worker(new URL('../worker/worker_wrapper.js', import.meta.url), { type: 'module' });

      worker.onmessage = (e) => {
        const { id, type, result, error: err } = e.data;
        if (type === 'ready') {
          statusDot.className = 'status-dot ready';
          statusText.textContent = 'Worker ready';
          return;
        }

        // Handle streaming auto-chunks (same id as init request)
        if (type === 'streamChunk' && result) {
          if (result.done) {
            // Final footer chunk
            streamChunks.push(result.footer || '');
            streamReceived = streamTotalBlocks;
            streamOffsets = result.offsets || '';
            renderStreamedContent();
            statusDot.className = 'status-dot ready';
            statusText.textContent = 'Extracting images...';
            progressBar.style.display = 'none';
            chunkIndicator.textContent = '';

            // Phase 2: Extract images in parallel
            loadImagesParallel(streamData, streamOffsets).then(() => {
              statusText.textContent = 'Complete';
              // Resolve the waiting promise
              if (streamWaitingFor) {
                streamWaitingFor.resolve();
                streamWaitingFor = null;
              }
            });
          } else {
            // Body chunk
            streamChunks.push(result.html);
            streamReceived = result.current || streamReceived;
            renderStreamedContent();
            // Update progress
            if (streamTotalBlocks > 0) {
              const pct = Math.round((streamReceived / streamTotalBlocks) * 100);
              progressFill.style.width = pct + '%';
              chunkIndicator.textContent = `${streamReceived}/${streamTotalBlocks} blocks rendered`;
            }
          }
          return;
        }

        // Handle streamInit response
        if (type === 'streamInit' && result) {
          streamCss = result.css || '';
          streamTotalBlocks = result.totalBlocks || 0;
          streamChunks = [];
          streamReceived = 0;
          return;
        }

        // Standard pending promise resolution
        const p = pending.get(id);
        if (p) {
          pending.delete(id);
          if (err) {
            console.error(`[Worker] ${type}#${id} ERROR:`, err);
            p.reject(new Error(err));
          } else {
            p.resolve(result);
          }
        }
      };

      worker.onerror = (e) => {
        statusDot.className = 'status-dot';
        statusText.textContent = 'Worker error';
        console.error('Worker error:', e);
      };
    }

    function callWorker(type, data, extra = {}) {
      return new Promise((resolve, reject) => {
        const id = ++requestId;
        pending.set(id, { resolve, reject });
        worker.postMessage({ type, data, id, ...extra });
      });
    }

    function waitForReady() {
      return new Promise((resolve) => {
        const check = (e) => {
          if (e.data.type === 'ready') {
            worker.removeEventListener('message', check);
            resolve();
          }
        };
        worker.addEventListener('message', check);
      });
    }

    function renderStreamedContent() {
      // Join all received chunks and render progressively
      const html = streamChunks.join('');
      viewer.innerHTML = '<style>' + streamCss + '</style>' + html;
    }

    async function loadImagesParallel(data, offsetsStr) {
      const placeholderEls = viewer.querySelectorAll('img[data-placeholder="true"]');
      if (placeholderEls.length === 0) return;
      if (!offsetsStr || offsetsStr.length === 0) return;

      const assetOffsets = offsetsStr.split(',').map(Number);
      let loaded = 0;

      for (let i = 0; i < placeholderEls.length; i++) {
        try {
          const offset = i < assetOffsets.length ? assetOffsets[i] : -1;
          if (offset < 0) { loaded++; continue; }

          const result = await callWorker('extractImage', data, { offset });
          if (result && result.startsWith('data:') && !result.includes('svg+xml')) {
            placeholderEls[i].src = result;
            placeholderEls[i].removeAttribute('data-placeholder');
          }
          loaded++;
          chunkIndicator.textContent = `Loading images... ${loaded}/${placeholderEls.length}`;
          await new Promise(r => setTimeout(r, 0));
        } catch (e) {
          loaded++;
        }
      }

      chunkIndicator.textContent = `${loaded} images loaded`;
    }

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadFile(e.target.files[0]);
    });

    async function loadFile(file) {
      try {
        error.style.display = 'none';
        info.style.display = 'none';
        viewer.innerHTML = '';
        streamChunks = [];
        streamCss = '';
        streamTotalBlocks = 0;
        streamReceived = 0;
        streamData = null;
        streamOffsets = '';

        if (!worker) {
          initWorker();
          await waitForReady();
        }

        const buffer = await file.arrayBuffer();
        const data = new Uint8Array(buffer);
        streamData = data;  // Save for image extraction

        statusDot.className = 'status-dot working';
        statusText.textContent = 'Parsing document...';
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';

        const t0 = performance.now();

        // Step 1: Initialize streaming parse
        await callWorker('streamInit', data, { chunkSize: 30 });

        // Step 2: Wait for all auto-streamed chunks to arrive
        await new Promise((resolve) => {
          streamWaitingFor = { resolve };
        });

        const totalTime = performance.now() - t0;
        const firstPaintTime = streamChunks.length > 0 ? totalTime * 0.3 : totalTime; // rough estimate

        info.style.display = 'block';
        info.innerHTML =
          '<strong>Streaming Parse Results</strong><br>' +
          'File: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)<br>' +
          'Total blocks: ' + streamTotalBlocks + '<br>' +
          'Total time: ' + totalTime.toFixed(1) + ' ms<br>' +
          'Mode: Progressive streaming (content appeared as parsed)';

      } catch (err) {
        statusDot.className = 'status-dot';
        statusText.textContent = 'Error';
        error.style.display = 'block';
        error.textContent = 'Error: ' + err.message;
        viewer.innerHTML = '';
        console.error(err);
      }
    }

    initWorker();
  </script>
</body>
</html>
